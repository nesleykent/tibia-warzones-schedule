<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warzone History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&amp;family=DM+Mono:wght@400;500&amp;display=swap"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div
      id="bg-layer"
      aria-hidden="true"
      data-artworks="bg1.jpg,bg2.jpg,bg3.jpg,bg4.jpg"
    ></div>

    <nav class="topbar" aria-label="Site navigation">
      <div class="container topbar-inner">
        <div class="topbar-links">
          <a href="./index.html">
            Home
          </a>
          <span class="topbar-divider" aria-hidden="true"></span>
          <a href="./open-houses.html">
            Open Houses
          </a>
          <span class="topbar-divider" aria-hidden="true"></span>
          <a href="./ranking.html">
            Ranking
          </a>
          <span class="topbar-divider" aria-hidden="true"></span>
          <a href="./bigfoot.html">
            <span class="link-full">Bigfoot's Burden Quest</span><span class="link-short">Quest</span>
          </a>
        </div>
        <div class="topbar-actions">
          <a
            href="https://github.com/nesleykent/tibia-warzones-schedule"
            target="_blank"
            rel="noopener noreferrer"
            class="topbar-icon-link"
            aria-label="Open GitHub repository"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
          </a>
          <div class="lang-dropdown" id="langDropdown">
            <button
              type="button"
              class="lang-menu-btn"
              id="langMenuBtn"
              aria-haspopup="true"
              aria-expanded="false"
              aria-label="Select language"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="12" cy="12" r="10" />
                <line x1="2" y1="12" x2="22" y2="12" />
                <path
                  d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                />
              </svg>
            </button>
            <div
              class="lang-menu"
              id="langMenu"
              role="menu"
              aria-label="Language selector"
            >
              <button
                type="button"
                class="lang-flag"
                data-lang="en"
                role="menuitem"
              >
                🇺🇸 <span>English</span>
              </button>
              <button
                type="button"
                class="lang-flag"
                data-lang="pt-BR"
                role="menuitem"
              >
                🇧🇷 <span>Português</span>
              </button>
              <button
                type="button"
                class="lang-flag"
                data-lang="es-419"
                role="menuitem"
              >
                🇦🇷 <span>Español</span>
              </button>
              <button
                type="button"
                class="lang-flag"
                data-lang="pl"
                role="menuitem"
              >
                🇵🇱 <span>Polski</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <header class="site-header" role="banner">
      <div class="container site-header-inner">
        <img
          class="header-icon"
          src="./assets/logo/logo.png"
          alt="Tibia Warzones logo"
        />
        <div class="header-text">
          <h1 id="worldTitle">Warzone History</h1>
          <p class="header-subtitle" id="worldSubtitle">
            Historical Warzone service records for the selected world.
          </p>
        </div>
      </div>
    </header>

    <main class="container world-page" id="worldPage">
      <section
        id="worldSummaryCard"
        class="world-detail-card"
        aria-live="polite"
      ></section>
      <section
        id="worldSchedulesCard"
        class="world-detail-card"
        aria-live="polite"
      ></section>
      <section
        id="worldBazaarCard"
        class="world-detail-card world-action-card"
        aria-live="polite"
      ></section>
      <section
        id="worldMarketPricesCard"
        class="world-detail-card"
        aria-live="polite"
      ></section>
      <section
        id="worldHistoryCard"
        class="world-detail-card"
        aria-live="polite"
      ></section>
    </main>

    <footer class="site-footer" role="contentinfo" data-site-footer></footer>

    <script src="./assets/shared.js" defer></script>
    <script src="./assets/world.js" defer></script>
  </body>
</html>
