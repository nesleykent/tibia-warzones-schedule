<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warzone History</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div
      id="bg-layer"
      aria-hidden="true"
      data-artworks="bg1.jpg,bg2.jpg,bg3.jpg,bg4.jpg"
    ></div>

    <nav class="topbar" aria-label="Site navigation">
      <div class="container topbar-inner">
        <div class="topbar-links">
          <a href="./index.html">
            Home
          </a>
          <span class="topbar-divider" aria-hidden="true"></span>
          <a href="./open-houses.html">
            Open Houses
          </a>
          <span class="topbar-divider" aria-hidden="true"></span>
          <a href="./ranking.html">
            Ranking
          </a>
          <span class="topbar-divider" aria-hidden="true"></span>
          <a href="./bigfoot.html">
            <span class="link-full">Bigfoot's Burden Quest</span><span class="link-short">Quest</span>
          </a>
        </div>
        <div class="topbar-actions">
          <div class="lang-dropdown" id="langDropdown">
            <button
              type="button"
              class="lang-menu-btn"
              id="langMenuBtn"
              aria-haspopup="true"
              aria-expanded="false"
              aria-label="Select language"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="12" cy="12" r="10" />
                <line x1="2" y1="12" x2="22" y2="12" />
                <path
                  d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                />
              </svg>
            </button>
            <div
              class="lang-menu"
              id="langMenu"
              role="menu"
              aria-label="Language selector"
            >
              <button
                type="button"
                class="lang-flag"
                data-lang="en"
                role="menuitem"
              >
                🇺🇸 <span>English</span>
              </button>
              <button
                type="button"
                class="lang-flag"
                data-lang="pt-BR"
                role="menuitem"
              >
                🇧🇷 <span>Português</span>
              </button>
              <button
                type="button"
                class="lang-flag"
                data-lang="es-419"
                role="menuitem"
              >
                🇦🇷 <span>Español</span>
              </button>
              <button
                type="button"
                class="lang-flag"
                data-lang="pl"
                role="menuitem"
              >
                🇵🇱 <span>Polski</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <header class="site-header" role="banner">
      <div class="container site-header-inner">
        <img
          class="header-icon"
          src="./assets/logo/logo.png"
          alt="Tibia Warzones logo"
        />
        <div class="header-text">
          <h1 id="worldTitle">Warzone History</h1>
          <p class="header-subtitle" id="worldSubtitle">
            Historical Warzone service records for the selected world.
          </p>
        </div>
      </div>
    </header>

    <main class="container world-page" id="worldPage">
      <section
        id="worldSummaryCard"
        class="world-detail-card"
        aria-live="polite"
      ></section>
      <section
        id="worldSchedulesCard"
        class="world-detail-card"
        aria-live="polite"
      ></section>
      <section
        id="worldBazaarCard"
        class="world-detail-card world-action-card"
        aria-live="polite"
      ></section>
      <section
        id="worldMarketPricesCard"
        class="world-detail-card"
        aria-live="polite"
      ></section>
      <section
        id="worldHistoryCard"
        class="world-detail-card"
        aria-live="polite"
      ></section>
    </main>

    <footer class="site-footer" role="contentinfo" data-site-footer></footer>

    <script src="./assets/shared.js" defer></script>
    <script src="./assets/world.js" defer></script>
  </body>
</html>
