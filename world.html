<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warzone History</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div id="bg-layer" aria-hidden="true"></div>

    <div class="topbar" role="navigation" aria-label="Site navigation">
      <div class="container topbar-inner">
        <div class="topbar-links">
          <a href="./index.html"> << Back</a>
        </div>
      </div>
    </div>

    <header class="site-header" role="banner">
      <div class="container site-header-inner">
        <img
          class="header-icon"
          src="./assets/logo/logo.png"
          alt="Tibia Warzones logo"
        />
        <div class="header-text">
          <h1 id="worldTitle">Warzone History</h1>
          <p class="header-subtitle" id="worldSubtitle">
            Historical Warzone service records for the selected world.
          </p>
        </div>

        <div class="header-controls">
          <div class="lang-dropdown" id="langDropdown">
            <button
              type="button"
              class="lang-menu-btn"
              id="langMenuBtn"
              aria-haspopup="true"
              aria-expanded="false"
              aria-label="Select language"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="12" cy="12" r="10" />
                <line x1="2" y1="12" x2="22" y2="12" />
                <path
                  d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                />
              </svg>
            </button>
            <div
              class="lang-menu"
              id="langMenu"
              role="menu"
              aria-label="Language selector"
            >
              <button
                type="button"
                class="lang-flag"
                data-lang="en"
                role="menuitem"
              >
                🇺🇸 <span>English</span>
              </button>
              <button
                type="button"
                class="lang-flag"
                data-lang="pt-BR"
                role="menuitem"
              >
                🇧🇷 <span>Português</span>
              </button>
              <button
                type="button"
                class="lang-flag"
                data-lang="es-419"
                role="menuitem"
              >
                🇦🇷 <span>Español</span>
              </button>
              <button
                type="button"
                class="lang-flag"
                data-lang="pl"
                role="menuitem"
              >
                🇵🇱 <span>Polski</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="container world-page" id="worldPage">
      <section
        id="worldSummaryCard"
        class="world-detail-card"
        aria-live="polite"
      ></section>
      <section
        id="worldSchedulesCard"
        class="world-detail-card"
        aria-live="polite"
      ></section>
      <!-- Phase 3: Market Prices block between schedule and history -->
      <section
        id="worldMarketPricesCard"
        class="world-detail-card"
        aria-live="polite"
      ></section>
      <section
        id="worldHistoryCard"
        class="world-detail-card"
        aria-live="polite"
      ></section>
    </main>

    <script>
      (function () {
        var artworks = ["bg1.jpg", "bg2.jpg", "bg3.jpg", "bg4.jpg"];
        var layer = document.getElementById("bg-layer");
        if (!layer) return;
        var pick = artworks[Math.floor(Math.random() * artworks.length)];
        var img = new Image();
        img.onload = function () {
          layer.style.backgroundImage = "url(assets/background/" + pick + ")";
          layer.style.opacity = "1";
        };
        layer.style.opacity = "0";
        img.src = "assets/background/" + pick;
      })();
    </script>

    <script>
      (function () {
        var btn = document.getElementById("langMenuBtn");
        var menu = document.getElementById("langMenu");
        var wrap = document.getElementById("langDropdown");
        if (!btn || !menu || !wrap) return;

        function open() {
          menu.classList.add("is-open");
          btn.setAttribute("aria-expanded", "true");
        }
        function close() {
          menu.classList.remove("is-open");
          btn.setAttribute("aria-expanded", "false");
        }
        function toggle() {
          menu.classList.contains("is-open") ? close() : open();
        }

        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          toggle();
        });
        document.addEventListener("click", function (e) {
          if (!wrap.contains(e.target)) close();
        });
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") close();
        });
      })();
    </script>

    <script src="./assets/shared.js"></script>
    <script src="./assets/world.js"></script>
  </body>
</html>
