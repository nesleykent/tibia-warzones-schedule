name: Update Open Houses

on:
  workflow_dispatch:
    inputs:
      comment_all_issues:
        description: "Also post or refresh status comments for all current open-house issues"
        required: false
        default: false
        type: boolean
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled
      - unlabeled
      - closed
  schedule:
    - cron: "45 9 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: update-open-houses
  cancel-in-progress: false

jobs:
  update-open-houses:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPEN_HOUSE_API_TOKEN: ${{ secrets.OPEN_HOUSE_GITHUB_TOKEN || github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild open house registry
        env:
          GITHUB_TOKEN: ${{ env.OPEN_HOUSE_API_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ISSUE_ARGS=""
          if [ "${{ github.event_name }}" = "issues" ]; then
            ISSUE_ARGS="--report-issue-number ${{ github.event.issue.number }} --report-path /tmp/open-house-issue-report.json"
          fi
          python3 scripts/build_open_houses.py $ISSUE_ARGS

      - name: Validate generated open house data
        run: |
          python3 -m py_compile scripts/build_open_houses.py
          python3 - <<'PY'
          import json
          from pathlib import Path

          open_houses = json.loads(Path("data/open-houses.json").read_text(encoding="utf-8"))
          houses_index = json.loads(Path("data/houses-index.json").read_text(encoding="utf-8"))

          assert isinstance(open_houses, list), "data/open-houses.json must contain a list"
          assert isinstance(houses_index, list), "data/houses-index.json must contain a list"

          required_record_keys = {
              "id",
              "houseName",
              "ownerName",
              "world",
              "town",
              "status",
              "utilities",
              "lastSeenOpen",
              "confidence",
              "source",
          }
          for record in open_houses:
              missing = required_record_keys.difference(record)
              assert not missing, f"Missing open house keys: {sorted(missing)}"

          required_index_keys = {"houseId", "name", "world", "town", "type", "status", "owner", "raw"}
          for record in houses_index:
              missing = required_index_keys.difference(record)
              assert not missing, f"Missing house index keys: {sorted(missing)}"
          PY

      - name: Commit updated open house data
        env:
          COMMIT_AUTHOR_NAME: ${{ vars.COMMIT_AUTHOR_NAME || github.repository_owner }}
          COMMIT_AUTHOR_EMAIL: ${{ vars.COMMIT_AUTHOR_EMAIL || format('{0}@users.noreply.github.com', github.repository_owner) }}
        run: |
          if git diff --quiet -- data/open-houses.json data/houses-index.json; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "$COMMIT_AUTHOR_NAME"
          git config user.email "$COMMIT_AUTHOR_EMAIL"
          git add data/open-houses.json data/houses-index.json
          git commit -m "chore: refresh open house registry"
          git pull --rebase origin main
          git push

      - name: Comment on processed issue
        if: github.event_name == 'issues' && secrets.OPEN_HOUSE_GITHUB_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.OPEN_HOUSE_GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          report_path = Path("/tmp/open-house-issue-report.json")
          if not report_path.exists():
              raise SystemExit("Missing issue report file.")

          payload = json.loads(report_path.read_text(encoding="utf-8"))
          if payload is None:
              payload = {
                  "issue_number": int(os.environ["ISSUE_NUMBER"]),
                  "status": "rejected",
                  "reason": "Issue was not processed by the registry builder.",
              }

          marker = "<!-- open-house-status -->"
          status = payload.get("status")
          if status == "accepted":
              body = (
                  f"{marker}\n"
                  f"Open House accepted.\n\n"
                  f"- House: {payload.get('house_name') or 'Unknown'}\n"
                  f"- Owner: {payload.get('owner_name') or 'Unknown'}\n"
                  f"- World: {payload.get('world') or 'Unknown'}\n"
                  f"- Town: {payload.get('town') or 'Unknown'}\n"
                  f"- Result: Added to the public registry on the next Pages deploy."
              )
          else:
              body = (
                  f"{marker}\n"
                  f"Open House rejected.\n\n"
                  f"- Reason: {payload.get('reason') or 'Unknown error'}"
              )

          repo = os.environ["REPO"]
          issue_number = os.environ["ISSUE_NUMBER"]
          comments_raw = subprocess.check_output(
              [
                  "gh",
                  "api",
                  f"repos/{repo}/issues/{issue_number}/comments",
              ],
              text=True,
          )
          comments = json.loads(comments_raw)
          existing = None
          for comment in comments:
              if marker in str(comment.get("body") or ""):
                  existing = comment
                  break

          if existing is not None:
              subprocess.check_call(
                  [
                      "gh",
                      "api",
                      "--method",
                      "PATCH",
                      f"repos/{repo}/issues/comments/{existing['id']}",
                      "-f",
                      f"body={body}",
                  ]
              )
          else:
              subprocess.check_call(
                  [
                      "gh",
                      "api",
                      "--method",
                      "POST",
                      f"repos/{repo}/issues/{issue_number}/comments",
                      "-f",
                      f"body={body}",
                  ]
              )
          PY

      - name: Comment on all current open-house issues
        if: github.event_name == 'workflow_dispatch' && inputs.comment_all_issues && secrets.OPEN_HOUSE_GITHUB_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.OPEN_HOUSE_GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          repo = os.environ["REPO"]
          marker = "<!-- open-house-status -->"

          issues_raw = subprocess.check_output(
              [
                  "gh",
                  "api",
                  f"repos/{repo}/issues?state=all&per_page=100",
              ],
              text=True,
          )
          issues = json.loads(issues_raw)

          def normalize(value: str) -> str:
              return " ".join(str(value or "").strip().lower().split())

          def is_open_house_issue(issue: dict) -> bool:
              labels = issue.get("labels") or []
              label_names = {
                  normalize(label.get("name"))
                  for label in labels
                  if isinstance(label, dict) and label.get("name")
              }
              if "open-house" in label_names:
                  return True
              title = normalize(issue.get("title") or "")
              return title.startswith("[open house]:")

          def build_body(payload: dict) -> str:
              if payload.get("status") == "accepted":
                  return (
                      f"{marker}\n"
                      f"Open House accepted.\n\n"
                      f"- House: {payload.get('house_name') or 'Unknown'}\n"
                      f"- Owner: {payload.get('owner_name') or 'Unknown'}\n"
                      f"- World: {payload.get('world') or 'Unknown'}\n"
                      f"- Town: {payload.get('town') or 'Unknown'}\n"
                      f"- Result: Added to the public registry on the next Pages deploy."
                  )
              return (
                  f"{marker}\n"
                  f"Open House rejected.\n\n"
                  f"- Reason: {payload.get('reason') or 'Unknown error'}"
              )

          for issue in issues:
              if not isinstance(issue, dict) or "pull_request" in issue:
                  continue
              if not is_open_house_issue(issue):
                  continue

              issue_number = int(issue["number"])
              report_path = Path(f"/tmp/open-house-report-{issue_number}.json")

              subprocess.check_call(
                  [
                      "python3",
                      "scripts/build_open_houses.py",
                      "--report-issue-number",
                      str(issue_number),
                      "--report-path",
                      str(report_path),
                  ]
              )

              payload = json.loads(report_path.read_text(encoding="utf-8"))
              if payload is None:
                  payload = {
                      "issue_number": issue_number,
                      "status": "rejected",
                      "reason": "Issue was not processed by the registry builder.",
                  }

              body = build_body(payload)
              comments_raw = subprocess.check_output(
                  [
                      "gh",
                      "api",
                      f"repos/{repo}/issues/{issue_number}/comments",
                  ],
                  text=True,
              )
              comments = json.loads(comments_raw)
              existing = None
              for comment in comments:
                  if marker in str(comment.get("body") or ""):
                      existing = comment
                      break

              if existing is not None:
                  subprocess.check_call(
                      [
                          "gh",
                          "api",
                          "--method",
                          "PATCH",
                          f"repos/{repo}/issues/comments/{existing['id']}",
                          "-f",
                          f"body={body}",
                      ]
                  )
              else:
                  subprocess.check_call(
                      [
                          "gh",
                          "api",
                          "--method",
                          "POST",
                          f"repos/{repo}/issues/{issue_number}/comments",
                          "-f",
                          f"body={body}",
                      ]
                  )
          PY
