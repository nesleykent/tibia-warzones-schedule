name: Update Open Houses

on:
  workflow_dispatch:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled
      - unlabeled
      - closed
  schedule:
    - cron: "45 9 * * *"

permissions:
  contents: write
  issues: read

concurrency:
  group: update-open-houses
  cancel-in-progress: false

jobs:
  update-open-houses:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild open house registry
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/build_open_houses.py

      - name: Validate generated open house data
        run: |
          python3 -m py_compile scripts/build_open_houses.py
          python3 - <<'PY'
          import json
          from pathlib import Path

          open_houses = json.loads(Path("data/open-houses.json").read_text(encoding="utf-8"))
          houses_index = json.loads(Path("data/houses-index.json").read_text(encoding="utf-8"))

          assert isinstance(open_houses, list), "data/open-houses.json must contain a list"
          assert isinstance(houses_index, list), "data/houses-index.json must contain a list"

          required_record_keys = {
              "id",
              "houseName",
              "ownerName",
              "world",
              "town",
              "status",
              "utilities",
              "lastSeenOpen",
              "confidence",
              "source",
          }
          for record in open_houses:
              missing = required_record_keys.difference(record)
              assert not missing, f"Missing open house keys: {sorted(missing)}"

          required_index_keys = {"houseId", "name", "world", "town", "type", "status", "owner", "raw"}
          for record in houses_index:
              missing = required_index_keys.difference(record)
              assert not missing, f"Missing house index keys: {sorted(missing)}"
          PY

      - name: Commit updated open house data
        env:
          COMMIT_AUTHOR_NAME: ${{ vars.COMMIT_AUTHOR_NAME || github.repository_owner }}
          COMMIT_AUTHOR_EMAIL: ${{ vars.COMMIT_AUTHOR_EMAIL || format('{0}@users.noreply.github.com', github.repository_owner) }}
        run: |
          if git diff --quiet -- data/open-houses.json data/houses-index.json; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "$COMMIT_AUTHOR_NAME"
          git config user.email "$COMMIT_AUTHOR_EMAIL"
          git add data/open-houses.json data/houses-index.json
          git commit -m "chore: refresh open house registry"
          git pull --rebase origin main
          git push
