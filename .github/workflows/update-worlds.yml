name: Update Worlds

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - data/manual-schedules.json
      - scripts/update_data.py
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

concurrency:
  group: update-worlds
  cancel-in-progress: false

jobs:
  update-worlds:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh worlds data
        run: python scripts/update_data.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/worlds.json data/history; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/worlds.json data/history
          git commit -m "chore: refresh worlds and history data"
          git push
