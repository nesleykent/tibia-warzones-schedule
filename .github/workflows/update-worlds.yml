name: Update Worlds

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - data/manual-schedules.json
      - data/active_warzones.txt
      - scripts/common.py
      - scripts/economic_ranking.py
      - scripts/enrich_worlds_with_rankings.py
      - scripts/update_data.py
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

concurrency:
  group: update-worlds
  cancel-in-progress: false

jobs:
  update-worlds:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh worlds data
        run: python scripts/update_data.py

      - name: Validate generated data
        run: |
          python3 -m py_compile scripts/update_data.py
          python3 - <<'PY'
          import json
          from pathlib import Path

          worlds_path = Path("data/worlds.json")
          payload = json.loads(worlds_path.read_text(encoding="utf-8"))
          assert isinstance(payload, list), "data/worlds.json must contain a list"
          assert payload, "data/worlds.json must not be empty"
          required_keys = {
              "name",
              "tracks_warzone_service",
              "warzone_services_per_day",
              "last_detected_kills",
              "last_detected_services",
              "mark",
              "has_service_history",
              "warzone_executions",
          }
          for record in payload:
              missing = required_keys.difference(record)
              assert not missing, f"Missing keys for {record.get('name')}: {sorted(missing)}"
          PY

      - name: Commit updated data
        env:
          COMMIT_AUTHOR_NAME: ${{ vars.COMMIT_AUTHOR_NAME || github.repository_owner }}
          COMMIT_AUTHOR_EMAIL: ${{ vars.COMMIT_AUTHOR_EMAIL || format('{0}@users.noreply.github.com', github.repository_owner) }}
        run: |
          if git diff --quiet -- data/worlds.json data/history; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "$COMMIT_AUTHOR_NAME"
          git config user.email "$COMMIT_AUTHOR_EMAIL"
          git add data/worlds.json data/history
          git commit -m "chore: refresh worlds and history data"
          git pull --rebase origin main
          git push
