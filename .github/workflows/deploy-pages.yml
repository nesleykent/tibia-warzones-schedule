name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * *"
    - cron: "0 1 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate static site assets
        run: |
          node --check assets/shared.js
          node --check assets/app.js
          node --check assets/ranking.js
          node --check assets/bigfoot.js
          node --check assets/world.js
          node --check assets/open-houses.js

      - name: Validate required site files
        run: |
          test -f index.html
          test -f open-houses.html
          test -f ranking.html
          test -f bigfoot.html
          test -f world.html
          test -f assets/styles.css
          test -f data/worlds.json
          test -f data/open-houses.json
          test -f data/houses-index.json

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp -R assets data index.html open-houses.html ranking.html bigfoot.html world.html LICENSE README.md _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
