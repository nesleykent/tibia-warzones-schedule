name: Submit Open House
description: Submit an open house report with the in-game door log and utility checklist.
title: "[Open House]: "
labels:
  - open-house
body:
  - type: textarea
    id: door_inspection_log
    attributes:
      label: Door inspection log
      description: Paste the exact in-game door inspection log.
      placeholder: "You see an open door. It belongs to house 'Park Lane 1a'. Padilharp owns this house."
    validations:
      required: true
  - type: dropdown
    id: exercise_dummies
    attributes:
      label: Exercise dummies
      options:
        - "true"
        - "false"
    validations:
      required: true
  - type: dropdown
    id: mailbox
    attributes:
      label: Mailbox
      options:
        - "true"
        - "false"
    validations:
      required: true
  - type: dropdown
    id: reward_shrine
    attributes:
      label: Reward shrine
      options:
        - "true"
        - "false"
    validations:
      required: true
  - type: dropdown
    id: imbuing_shrine
    attributes:
      label: Imbuing shrine
      options:
        - "true"
        - "false"
    validations:
      required: true
  - type: checkboxes
    id: hirelings
    attributes:
      label: Hirelings
      options:
        - label: Apprentice
        - label: Banker
        - label: Cook
        - label: Steward
        - label: Trader
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional house notes for reviewers and visitors.
    validations:
      required: false
  - type: input
    id: screenshot_url
    attributes:
      label: Screenshot URL
      description: Optional public screenshot link.
      placeholder: https://example.com/open-house.png
    validations:
      required: false
